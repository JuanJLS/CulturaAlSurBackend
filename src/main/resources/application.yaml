spring:
  application:
    name: CulturaAlSur
  datasource:
    url: jdbc:postgresql://localhost:5432/casbackend
    username: admin
    password:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true